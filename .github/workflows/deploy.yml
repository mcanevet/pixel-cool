name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-${{ github.event.pull_request.number || 'main' }}"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect deployment context
        id: context
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "url=/pixel-cool-pr-${{ github.event.pull_request.number }}/" >> $GITHUB_OUTPUT
          else
            echo "url=/pixel-cool/" >> $GITHUB_OUTPUT
          fi

      - name: Update start_url for PR preview
        if: github.event_name == 'pull_request'
        run: |
          sed -i 's|"start_url": "[^"]*"|"start_url": "${{ steps.context.outputs.url }}"|' manifest.json

      - name: Deploy to GitHub Pages
        uses: JamesIvy/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          folder: .
          target_branch: gh-pages
          branch: gh-pages
          clean: true
          gitCommitMessage: "Deploy ${{ github.ref }}"

      - name: Comment PR with preview URL
        if: github.event_name == 'pull_request'
        run: |
          echo "## Preview URL" >> $GITHUB_STEP_SUMMARY
          echo "https://mcanevet.github.io/pixel-cool/pr-${{ github.event.pull_request.number }}/" >> $GITHUB_STEP_SUMMARY
